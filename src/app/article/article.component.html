<section class="page-hero" *ngIf="issue">
  <div class="container">
    <span class="eyebrow">赤乌堂 · 最新消息</span>
    <h1>{{ issue.title }}</h1>
    <div class="meta">
      <img class="avatar" src="{{ issue.user.avatar_url }}" alt="{{ issue.user.login }}">
      <div>
        <strong>{{ issue.user.login }}</strong>
        <span>{{ issue.created_at }}</span>
      </div>
    </div>
  </div>
</section>

<section class="section" *ngIf="issue">
  <div class="container">
    <div class="article-body">
      <markdown>
        {{ issue.body }}
      </markdown>
    </div>
  </div>
</section>
