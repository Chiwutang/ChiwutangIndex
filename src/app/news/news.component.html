<section class="page-hero">
  <div class="container">
    <span class="eyebrow">赤乌堂 · 最新消息</span>
    <h1>最新消息</h1>
    <p>记录读书会的最新文章、讨论与更新，方便快速追踪与回顾。</p>
  </div>
</section>

<section class="section">
  <div class="container">


    <div class="center" [hidden]="!showSpinner">
      <mat-spinner color="accent"></mat-spinner>
    </div>

    <div class="news-list">
      <article class="news-card" *ngFor="let issue of issues">
        <img class="news-avatar" height="64" src="{{ issue.user.avatar_url }}" alt="{{ issue.user.login }}">
        <div class="news-content">
          <a class="news-title" [routerLink]="['/news', issue.number]">{{ issue.title }}</a>
          <p class="news-excerpt">{{ issue.text }}</p>
          <div class="news-meta">
            <span>{{ issue.user.login }}</span>
            <span>{{ issue.created_at }}</span>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
